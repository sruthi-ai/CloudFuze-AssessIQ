# Nginx virtual host for neutaraassessment.cftools.live
# Server nginx acts as a reverse proxy to the Docker frontend container (port 8080)
#
# Place at: /etc/nginx/sites-available/neutaraassessment
# Enable:   sudo ln -s /etc/nginx/sites-available/neutaraassessment /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name neutaraassessment.cftools.live;

    # Redirect HTTP → HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }
}

# HTTPS block — certbot populates ssl_certificate lines automatically:
#   sudo certbot --nginx -d neutaraassessment.cftools.live
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name neutaraassessment.cftools.live;

    # ssl_certificate     /etc/letsencrypt/live/neutaraassessment.cftools.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/neutaraassessment.cftools.live/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }
}

databases:
  - name: assessiq-db
    databaseName: assessiq
    user: assessiq
    plan: free

services:
  # ── Backend (Fastify API) ──────────────────────────────────────────────────
  - type: web
    name: assessiq-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate resolve --rolled-back 20260509101456_init 2>/dev/null; npx prisma migrate deploy && node dist/server.js
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assessiq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      # Set FRONTEND_URL to your frontend's Render URL after first deploy
      - key: FRONTEND_URL
        sync: false
      # Optional — add your Resend API key for email invites
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@assessiq.com
      # Optional — Judge0 CE for code execution
      - key: JUDGE0_API_KEY
        sync: false
      - key: JUDGE0_URL
        value: https://judge0-ce.p.rapidapi.com

  # ── Frontend (React static site) ──────────────────────────────────────────
  - type: web
    name: assessiq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to your backend's Render URL, e.g. https://assessiq-backend.onrender.com
      - key: VITE_API_URL
        sync: false
